version: '3.8'

services:
  webapp:
    build:
      context: ..
      dockerfile: docker/webapp.Dockerfile
    expose:
      - "5000"
    environment:
      - PORT=5000
    networks:
      - aiops-network
    deploy:
      replicas: 2
    labels:
      - "aiops.service=webapp"

  nginx:
    image: nginx:alpine
    ports:
      - "5000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - aiops-network
    depends_on:
      - webapp

  prediction-service:
    build:
      context: ..
      dockerfile: docker/prediction_service.Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../models:/app/models
    environment:
      - MODEL_PATH=models/lstm_model.pkl
      - SCALER_PATH=models/scaler.pkl
    networks:
      - aiops-network
    depends_on:
      - webapp

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.no-lockfile'
      - '--web.enable-lifecycle'
    extra_hosts:
      - "webapp:host-gateway"
      - "prediction-service:host-gateway"
    user: "0"
    networks:
      - aiops-network
    depends_on:
      - webapp
      - prediction-service

  grafana:
    image: grafana/grafana:10.2.2
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana-provisioning:/etc/grafana/provisioning
    networks:
      - aiops-network
    depends_on:
      - prometheus

networks:
  aiops-network:
    driver: bridge

volumes:
  prometheus-data:

events {
    worker_connections 1024;
}

http {
    # Enable stub status for monitoring
    server {
        listen 80;
        
        location / {
            proxy_pass http://webapp:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /metrics {
            proxy_pass http://webapp:5000/metrics;
        }

        location /health {
            proxy_pass http://webapp:5000/health;
        }

        # Nginx stub status
        location /nginx_status {
            stub_status on;
            allow 127.0.0.1;
            allow 172.19.0.0/16;
            deny all;
        }
    }
}

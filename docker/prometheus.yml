global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'webapp'
    static_configs:
      - targets: ['nginx:80']
    metrics_path: /metrics

  - job_name: 'prediction-service'
    static_configs:
      - targets: ['prediction-service:8000']
    metrics_path: /metrics

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
